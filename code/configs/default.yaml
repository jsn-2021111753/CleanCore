# Shared defaults for all methods.

model:
  hidden_dims: [256, 128]
  dropout: 0.2
  batch_norm: true

training:
  optimizer: adamw
  device: cpu
  num_workers: 0
  lr: 0.001
  weight_decay: 0.0001
  batch_size: 256
  max_epochs: 10000
  early_stop: true
  early_stop_patience: 50
  early_stop_min_delta: 0.0001
  save_last_model: true
  save_best_model: false

preprocessing:
  standardize: true

experiment:
  metric_primary: accuracy
  metrics:
    - accuracy
    - macro_precision
    - macro_recall
    - macro_f1
  save_history: true
  report_total_time: true
