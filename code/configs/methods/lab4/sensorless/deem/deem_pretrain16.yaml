paper_reference: 'Two Birds with One Stone: Efficient Deep Learning over Mislabeled
  Data through Subset Selection'
method_type: training_coupled
warmup_epochs: 16
selection_interval: 38
subset_fraction: 0.05
subset_size: 2340
min_per_class: 1
selector: paper_greedy
soft_label_mode: paper_loss_std
soft_label_window: 2
mislabel_remove_ratio: 0.005
q: 0.005
subset_update_threshold: 0.42
tau: 0.42
greedy_sample_size: 32
greedy_eval_sample_size: 96
greedy_steps_cap: 2
mapping_sample_size: 1024
distance_row_batch_size: 1024
distance_candidate_batch_size: 16
deem_mode: optimized
max_candidate_samples: 3000
greedy_batch_size: 16
mapping_backend: ball_tree
update_strategy: inherit_cluster
