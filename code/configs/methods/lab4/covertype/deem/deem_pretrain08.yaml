paper_reference: 'Two Birds with One Stone: Efficient Deep Learning over Mislabeled
  Data through Subset Selection'
method_type: training_coupled
subset_fraction: 0.05
subset_size: 23240
min_per_class: 1
deem_mode: optimized
warmup_epochs: 8
selection_interval: 45
selector: paper_greedy
soft_label_mode: paper_loss_std
soft_label_window: 3
mislabel_remove_ratio: 0.02
q: 0.02
subset_update_threshold: 0.3
tau: 0.3
greedy_sample_size: 32
greedy_eval_sample_size: 512
greedy_steps_cap: 64
max_candidate_samples: 60000
mapping_sample_size: 30000
mapping_backend: chunked_matmul
distance_row_batch_size: 2048
distance_candidate_batch_size: 32
greedy_batch_size: 32
update_strategy: inherit_cluster
