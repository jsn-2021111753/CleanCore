tau: 0.27
greedy_sample_size: 1
greedy_eval_sample_size: 102
greedy_steps_cap: 13
mapping_sample_size: 512
mapping_backend: kd_tree
distance_row_batch_size: 512
distance_candidate_batch_size: 1
deem_mode: optimized
greedy_batch_size: 1
max_candidate_samples: 512
update_strategy: inherit_cluster
