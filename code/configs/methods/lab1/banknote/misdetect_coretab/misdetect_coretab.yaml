paper_reference: Sequential pipeline baseline using MisDetect and CoreTab
method_type: sequential_pipeline
pipeline_order:
- misdetect
- coretab
subset_fraction: 0.1
subset_size: 110
min_per_class: 1
misdetect:
  paper_reference: 'MisDetect: Iterative Mislabel Detection using Early Loss'
  method_type: training_assisted_data_processing
  rounds: 7
  epochs_per_round: 7
  threshold_strategy: mean_std
  loss_std_factor: 1.15
  clean_std_factor: 0.7
  max_remove_ratio: 0.005
  enable_knn_verification: false
  knn_k: 3
  knn_disagreement_threshold: 0.4
  min_remaining: 60
  remove_ratio: 0.005
coretab:
  paper_reference: Datamap-Driven Tabular Coreset Selection for Classifier Training
  implementation_reference: CoreTab official CoreTabXGB create_coreset
  method_type: training_assisted_data_processing
  backend: official_xgboost
  subset_fraction: 0.1
  subset_size: 110
  min_per_class: 1
  sample_percent: 0.02
  examples_to_keep: 2938
  threshold: 5
  n_jobs: 1
  num_trees: 110
  trees_number: 110
  gbdt_estimators: 110
  gbdt_max_depth: 2
  tau: 4
  min_region_size: 5
  psi: 1.0
  homogeneity_threshold: 1.0
