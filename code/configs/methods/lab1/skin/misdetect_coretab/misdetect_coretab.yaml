paper_reference: Sequential pipeline baseline using MisDetect and CoreTab
method_type: sequential_pipeline
pipeline_order:
- misdetect
- coretab
subset_fraction: 0.05
subset_size: 9802
min_per_class: 1
misdetect:
  paper_reference: 'MisDetect: Iterative Mislabel Detection using Early Loss'
  method_type: training_assisted_data_processing
  rounds: 9
  epochs_per_round: 7
  threshold_strategy: mean_std
  loss_std_factor: 1.85
  clean_std_factor: 0.4
  max_remove_ratio: 0.03
  enable_knn_verification: false
  knn_k: 5
  knn_disagreement_threshold: 0.5
  min_remaining: 5391
  remove_ratio: 0.03
coretab:
  paper_reference: Datamap-Driven Tabular Coreset Selection for Classifier Training
  implementation_reference: CoreTab official CoreTabXGB create_coreset
  method_type: training_assisted_data_processing
  backend: official_xgboost
  subset_fraction: 0.05
  subset_size: 9802
  min_per_class: 1
  sample_percent: 0.01
  examples_to_keep: 9048
  threshold: 5
  n_jobs: 1
  num_trees: 220
  trees_number: 220
  gbdt_estimators: 220
  gbdt_max_depth: 4
  tau: 4
  min_region_size: 5
  psi: 0.9
  homogeneity_threshold: 0.9
