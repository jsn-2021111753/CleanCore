paper_reference: 'Two Birds with One Stone: Efficient Deep Learning over Mislabeled
  Data through Subset Selection'
method_type: training_coupled
warmup_epochs: 2
selection_interval: 26
subset_fraction: 0.1
subset_size: 1522
min_per_class: 1
selector: paper_greedy
soft_label_mode: paper_loss_std
soft_label_window: 2
mislabel_remove_ratio: 0.002
q: 0.002
subset_update_threshold: 0.15
tau: 0.15
greedy_sample_size: 6
greedy_eval_sample_size: 512
greedy_steps_cap: 64
mapping_sample_size: 2500
mapping_backend: kd_tree
distance_row_batch_size: 512
distance_candidate_batch_size: 6
