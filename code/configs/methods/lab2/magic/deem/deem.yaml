paper_reference: 'Two Birds with One Stone: Efficient Deep Learning over Mislabeled
  Data through Subset Selection'
method_type: training_coupled
warmup_epochs: 3
selection_interval: 42
subset_fraction: 0.1
subset_size: 1522
min_per_class: 1
selector: paper_greedy
soft_label_mode: paper_loss_std
soft_label_window: 3
mislabel_remove_ratio: 0.0006
q: 0.0006
subset_update_threshold: 0.255
tau: 0.255
greedy_sample_size: 2
greedy_eval_sample_size: 128
greedy_steps_cap: 16
mapping_sample_size: 625
mapping_backend: kd_tree
distance_row_batch_size: 512
distance_candidate_batch_size: 2
deem_mode: optimized
greedy_batch_size: 2
max_candidate_samples: 512
update_strategy: inherit_cluster
lab2_dataset: magic
lab2_method: deem
lab2_noise_forms: random/shift x rates 0.06,0.12,0.18,0.24,0.30
lab2_subset_policy: inherits Lab1 subset_fraction/subset_size/fraction
